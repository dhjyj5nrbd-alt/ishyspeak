<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IshySpeak</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
background:#0b1020;
color:white;
}

header{
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
padding:20px;
}

.lesson{
background:#111827;
padding:16px;
margin-bottom:12px;
border-radius:12px;
cursor:pointer;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 16px;
border-radius:10px;
margin-top:10px;
}

audio{
width:100%;
margin-top:12px;
}

</style>
</head>

<body>

<header>IshySpeak</header>

<div class="container">

<div class="lesson" onclick="openLesson('first-impression-hacks')">
<b>First Impression Hacks</b><br>
Sound confident in the first 10 seconds.
</div>

<div class="lesson" onclick="openLesson('build-trust-with-voice')">
<b>Build Trust With Your Voice</b>
</div>

<div class="lesson" onclick="openLesson('confidence-wins')">
<b>Confidence Wins</b>
</div>

<div id="lessonArea"></div>

</div>

<script>

function audioUrlForLesson(id){
return "https://raw.githubusercontent.com/dhjyj5nrbd-alt/ishyspeak/main/" + id + ".mp3";
}

function openLesson(id){

let title=id.replaceAll("-"," ");

let audio=audioUrlForLesson(id);

document.getElementById("lessonArea").innerHTML=`

<h2>${title}</h2>

<button onclick="playAudio('${audio}')">
Coach With Audio
</button>

<div id="audioBox"></div>

`;

}

function playAudio(src){

document.getElementById("audioBox").innerHTML=`

<audio controls autoplay>
<source src="${src}" type="audio/mpeg">
</audio>

`;

}

</script>

</body>
</html>
