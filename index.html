<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>IshySpeak</title>
<link rel="manifest" href="./web/manifest.webmanifest">
<meta name="theme-color" content="#111827">

<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont;background:#0f172a;color:white;}
  header{padding:20px;text-align:center;background:#111827;}
  h1{margin:0;font-size:28px;}
  .subtitle{font-size:14px;opacity:0.7;margin-top:4px;}
  .container{padding:20px;}
  .card{background:#1f2937;border-radius:14px;padding:20px;margin-bottom:20px;}
  button{width:100%;padding:16px;border:none;border-radius:10px;font-size:16px;margin-top:10px;font-weight:700;}
  .play{background:#22c55e;color:white;}
  .stop{background:#ef4444;color:white;}
  .blue{background:#3b82f6;color:white;}
  .ghost{background:#111827;color:white;border:1px solid #374151;}
  .row{display:flex;gap:10px;}
  .row button{width:100%;}
  .lessonItem{padding:14px;border:1px solid #374151;border-radius:12px;margin-top:10px;cursor:pointer;}
  .lessonItem:hover{background:#111827;}
  .meta{opacity:.75;font-size:13px;margin-top:6px;line-height:1.4;}
  .now{font-size:16px;font-weight:800;margin-top:6px;}
  .small{opacity:.75;font-size:12px;margin-top:6px;}
</style>
</head>

<body>
<header>
  <h1>IshySpeak</h1>
  <div class="subtitle">Segmented lesson playlists • resume where you left off</div>
</header>

<div class="container">

  <div class="card">
    <h3>Lessons (Tap to play)</h3>
    <div id="lessonList"></div>
    <div class="meta">These lessons use your iPhone’s built-in voice for now. Next we can upgrade to premium AI voice using a hosted TTS server.</div>
  </div>

  <div class="card">
    <h3>Player</h3>
    <div class="now" id="nowTitle">Pick a lesson to start</div>
    <div class="small" id="nowMeta">—</div>

    <button class="play" onclick="playOrResume()">Play / Resume</button>

    <div class="row">
      <button class="ghost" onclick="prevSegment()">◀ Prev</button>
      <button class="ghost" onclick="nextSegment()">Next ▶</button>
    </div>

    <div class="row">
      <button class="blue" onclick="pauseSpeech()">Pause</button>
      <button class="stop" onclick="stopSpeech()">Stop</button>
    </div>

    <div class="meta" id="progress">—</div>
  </div>

  <div class="card">
    <h3>Practice Coach</h3>
    <div class="meta" id="practicePrompt"></div>
    <button class="blue" onclick="startRecording()">Start Practice Recording</button>
    <button class="stop" onclick="stopRecording()">Stop Recording</button>
    <div class="small" id="practiceStatus"></div>
  </div>

</div>

<script>
/* ========= LESSONS: (1,2,4,5) segmented playlists ========= */
const lessons = [
  {
    id: "01",
    title: "First Impression Hacks",
    segments: [
      { title:"Warm start", text:"Welcome to Lesson 1. First impressions happen fast. Before you speak, relax your shoulders and breathe out slowly. Your goal is calm confidence." },
      { title:"The 3-second rule", text:"In the first three seconds: eye contact, a small smile, and a steady pace. Imagine you’re speaking to someone you already like." },
      { title:"Name + one detail", text:"A strong opener is their name plus one detail. For example: Hey Sarah—great to meet you. I heard you work in design. Attention builds instant connection." },
      { title:"Micro-structure", text:"Use greet, context, question. Hi, I’m Ishy. I saw your talk earlier—what inspired that project? Short, warm, memorable." },
      { title:"Practice", text:"Practice now. Say: Hi, I’m Ishy. Great to meet you. What brings you here today? Say it once slowly, then once with a confident smile." }
    ]
  },
  {
    id: "02",
    title: "Build Trust With Your Voice",
    segments: [
      { title:"Trust tone", text:"Trust is built through calm certainty. Slightly lower your pitch and slow your tempo. Grounded, not performative." },
      { title:"The pause", text:"Your best trust hack is pausing. Say one idea, then pause half a second. It makes you sound confident and helps people follow you." },
      { title:"Warm authority", text:"Use warm authority: friendly tone, clear words. Replace filler words with a pause—especially at the start of sentences." },
      { title:"One-sentence clarity", text:"If you start to ramble, stop and summarize: So the main point is… People trust clarity." },
      { title:"Practice", text:"Practice now. Say: The main point is we need a simple plan, and I can lead the first step. Pause between the two parts." }
    ]
  },
  {
    id: "04",
    title: "Speak Up In Any Room",
    segments: [
      { title:"Permission mindset", text:"Speaking up starts with permission. You are allowed to take space. Your voice is an asset to the room." },
      { title:"Entry line", text:"Use an entry line: Can I add something? Or: One thought here… Then deliver one clear point." },
      { title:"One point only", text:"Share one point at a time. If you have more, say: I have one more quick point after this." },
      { title:"Handle interruption", text:"If interrupted, stay calm: Let me finish this sentence. Then finish slowly. Calm control wins the room." },
      { title:"Practice", text:"Practice now. Say: One thought here—if we simplify the first step, we’ll move faster. Pause. Then stop." }
    ]
  },
  {
    id: "05",
    title: "Storytelling Secrets",
    segments: [
      { title:"Simple story", text:"A good story is: situation, challenge, change. Keep it short. People remember change." },
      { title:"One vivid detail", text:"Add one vivid detail: a feeling, a moment, a visual. For example: My hands were shaking—but I pressed send anyway." },
      { title:"The lesson", text:"End with the lesson: That’s why I test the small version first. Stories without a lesson feel unfinished." },
      { title:"30-second version", text:"Aim for thirty seconds. If you need longer, ask: Want the short version or the full story?" },
      { title:"Practice", text:"Practice now. Tell a twenty-second story using: situation, challenge, change, lesson. Record it in the Practice Coach after." }
    ]
  }
];

/* ========= BOOKMARK / RESUME ========= */
const BOOKMARK_KEY = "ishyspeak_bookmark_v1";
// { lessonId, segIndex, charIndex }
let bookmark = loadBookmark() || { lessonId: lessons[0].id, segIndex: 0, charIndex: 0 };

function loadBookmark(){ try { return JSON.parse(localStorage.getItem(BOOKMARK_KEY)); } catch { return null; } }
function saveBookmark(){ localStorage.setItem(BOOKMARK_KEY, JSON.stringify(bookmark)); }

/* ========= PLAYER (SpeechSynthesis segmented playlist) ========= */
let utterance = null;
let paused = false;

function currentLesson(){ return lessons.find(l => l.id === bookmark.lessonId); }
function currentSeg(){ return currentLesson().segments[bookmark.segIndex]; }

function renderLessons(){
  const box = document.getElementById("lessonList");
  box.innerHTML = "";
  lessons.forEach(l => {
    const div = document.createElement("div");
    div.className = "lessonItem";
    div.innerHTML = `<b>Lesson ${l.id} — ${l.title}</b><div class="meta">${l.segments.length} segments</div>`;
    div.onclick = () => {
      stopSpeech();
      bookmark.lessonId = l.id;
      bookmark.segIndex = 0;
      bookmark.charIndex = 0;
      saveBookmark();
      renderPlayer();
      playOrResume();
    };
    box.appendChild(div);
  });
}

function pickVoice(){
  const voices = speechSynthesis.getVoices() || [];
  // try “natural” / Siri if present
  return voices.find(v => /en/i.test(v.lang) && /Siri|Enhanced|Premium|Natural/i.test(v.name))
      || voices.find(v => /en/i.test(v.lang))
      || null;
}

function renderPlayer(){
  const lesson = currentLesson();
  const seg = currentSeg();
  document.getElementById("nowTitle").textContent = `Lesson ${lesson.id} — ${lesson.title}`;
  document.getElementById("nowMeta").textContent = `Segment ${bookmark.segIndex+1}/${lesson.segments.length} • ${seg.title}`;
  document.getElementById("progress").textContent = `Bookmark: segment ${bookmark.segIndex+1}, position saved automatically.`;
}

function speakFrom(charIndex){
  const seg = currentSeg();
  const slice = seg.text.slice(charIndex || 0);

  utterance = new SpeechSynthesisUtterance(slice);
  const v = pickVoice();
  if (v) utterance.voice = v;

  utterance.rate = 0.95;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  utterance.onboundary = (e) => {
    // Save char position while speaking (best-effort)
    if (typeof e.charIndex === "number") {
      bookmark.charIndex = (charIndex || 0) + e.charIndex;
      saveBookmark();
    }
  };

  utterance.onend = () => {
    paused = false;
    bookmark.charIndex = 0;
    saveBookmark();
    // Auto-advance to next segment
    autoNext();
  };

  paused = false;
  speechSynthesis.speak(utterance);
}

function playOrResume(){
  renderPlayer();

  if (paused) {
    speechSynthesis.resume();
    paused = false;
    return;
  }

  if (speechSynthesis.speaking) return;

  speakFrom(bookmark.charIndex || 0);
}

function pauseSpeech(){
  if (speechSynthesis.speaking) {
    speechSynthesis.pause();
    paused = true;
  }
}

function stopSpeech(){
  speechSynthesis.cancel();
  paused = false;
  bookmark.charIndex = 0;
  saveBookmark();
  renderPlayer();
}

function autoNext(){
  const lesson = currentLesson();
  if (bookmark.segIndex < lesson.segments.length - 1) {
    bookmark.segIndex += 1;
  } else {
    // End of lesson — loop to start
    bookmark.segIndex = 0;
  }
  bookmark.charIndex = 0;
  saveBookmark();
  renderPlayer();
  // continue playing next segment automatically
  playOrResume();
}

function nextSegment(){
  stopSpeech();
  const lesson = currentLesson();
  bookmark.segIndex = Math.min(bookmark.segIndex + 1, lesson.segments.length - 1);
  bookmark.charIndex = 0;
  saveBookmark();
  renderPlayer();
  playOrResume();
}

function prevSegment(){
  stopSpeech();
  bookmark.segIndex = Math.max(bookmark.segIndex - 1, 0);
  bookmark.charIndex = 0;
  saveBookmark();
  renderPlayer();
  playOrResume();
}

/* ========= PRACTICE PROMPTS + SIMPLE RECORDING ========= */
const prompts = [
  "Introduce yourself in 20 seconds with calm confidence. Include your name and one detail.",
  "Tell a 20-second story using situation, challenge, change, lesson.",
  "Say no politely: appreciate, decline, alternative.",
  "Deliver feedback: observation, impact, suggestion."
];
function todaysPrompt(){
  const i = Math.floor(Date.now() / (1000*60*60*6)) % prompts.length;
  return prompts[i];
}
document.getElementById("practicePrompt").textContent = "Today’s prompt: " + todaysPrompt();

let recorder;
let audioChunks = [];

async function startRecording(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    audioChunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => audioChunks.push(e.data);
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      document.getElementById("practiceStatus").textContent = "Saved (local). Nice work — do 2 minutes daily.";
    };
    recorder.start();
    document.getElementById("practiceStatus").textContent = "Recording…";
  } catch(e){
    document.getElementById("practiceStatus").textContent = "Mic blocked. iPhone Settings → Safari → Microphone → Allow.";
  }
}
function stopRecording(){
  if(recorder && recorder.state !== "inactive") recorder.stop();
}

/* ========= INIT ========= */
renderLessons();
renderPlayer();
window.speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
